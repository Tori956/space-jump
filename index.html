<!DOCTYPE html>
<html>
<head>
    <title>EVEJ - Space Jump</title>
    <style>
        body { text-align: center; background: #0b0e14; color: white; font-family: 'Courier New', monospace; }
        canvas { background: #111827; border-bottom: 5px solid #38bdf8; display: block; margin: 20px auto; }
    </style>
</head>
<body>
    <h1>SPACE JUMP</h1>
    <h2>Score: <span id="score">0</span></h2>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <p>Click to Jump! | <a href="index.html" style="color: #38bdf8;">Back to Menu</a></p>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const playerImg = new Image();
        playerImg.src = 'astronaut.png.png'; // MATCHES YOUR FILENAME

        let score = 0, gameActive = true;
        let p = { x: 50, y: 300, w: 60, h: 90, dy: 0, g: 0.5, jump: -12, grounded: false };
        let obs = [];
        const items = ["💻", "🏆", "📚", "📝"];

        function draw() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, 800, 400);

            // Gravity
            p.dy += p.g; p.y += p.dy;
            if (p.y > 300) { p.y = 300; p.dy = 0; p.grounded = true; }

            // Draw Player
            if (playerImg.complete) { ctx.drawImage(playerImg, p.x, p.y, p.w, p.h); }
            else { ctx.fillStyle = "pink"; ctx.fillRect(p.x, p.y, p.w, p.h); }

            // Obstacles
            if (Math.random() < 0.02) obs.push({x: 800, text: items[Math.floor(Math.random()*4)]});
            obs.forEach((o, i) => {
                o.x -= 6;
                ctx.font = "40px serif"; ctx.fillText(o.text, o.x, 340);
                if (p.x < o.x + 30 && p.x + 40 > o.x && p.y > 260) {
                    gameActive = false; alert("Game Over! Score: " + score); location.reload();
                }
                if (o.x < -50) { obs.splice(i, 1); score++; document.getElementById("score").innerText = score; }
            });
            requestAnimationFrame(draw);
        }
        canvas.addEventListener("mousedown", () => { if(p.grounded){ p.dy = p.jump; p.grounded = false; } });
        draw();
    </script>
</body>
</html>
