<!DOCTYPE html>
<html>
<head>
    <title>EVEJ - Space Jump</title>
    <style>
        body { 
            text-align: center; 
            font-family: 'Courier New', Courier, monospace; 
            background: #0b0e14; 
            color: white;
            margin: 0;
            overflow: hidden;
        }
        canvas { 
            background: url('https://www.transparenttextures.com/patterns/stardust.png'), #0b0e14;
            border-bottom: 5px solid #334155;
            display: block;
            margin: 20px auto;
            cursor: pointer;
        }
        .ui { font-size: 24px; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>SPACE JUMP</h1>
    <div class="ui">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <p>Press <b>SPACE</b> or <b>Click</b> to Jump over the OC obstacles!</p>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // 1. Load your character
    const playerImg = new Image();
    playerImg.src = 'astronaut.png'; // Make sure your file is named exactly this!

    // 2. Game Variables
    let score = 0;
    let player = { x: 50, y: 300, w: 60, h: 90, dy: 0, jumpForce: 12, gravity: 0.6, grounded: false };
    let obstacles = [];
    let gameActive = true;
    const ocItems = ["💻", "🏆", "📚", "📝"]; // OC School Stuff

    function createObstacle() {
        let type = ocItems[Math.floor(Math.random() * ocItems.length)];
        obstacles.push({ x: 850, y: 330, w: 40, h: 40, text: type, speed: 6 + (score / 10) });
    }

    function update() {
        if (!gameActive) return;

        // Player Physics
        player.dy += player.gravity;
        player.y += player.dy;

        if (player.y > 300) {
            player.y = 300;
            player.dy = 0;
            player.grounded = true;
        }

        // Obstacle Logic
        if (Math.random() < 0.02) createObstacle();

        obstacles.forEach((obs, index) => {
            obs.x -= obs.speed;

            // Collision Check
            if (player.x < obs.x + obs.w && player.x + player.w > obs.x &&
                player.y < obs.y + obs.h && player.y + player.h > obs.y) {
                gameActive = false;
                alert("Game Over! The OC mission reached a score of: " + score);
                location.reload(); 
            }

            // Score point
            if (obs.x < -50) {
                obstacles.splice(index, 1);
                score++;
                document.getElementById("score").innerText = score;
            }
        });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Player (Your Image)
        ctx.drawImage(playerImg, player.x, player.y, player.w, player.h);

        // Draw Obstacles (Emojis for OC stuff)
        ctx.font = "40px serif";
        obstacles.forEach(obs => {
            ctx.fillText(obs.text, obs.x, obs.y + 30);
        });

        update();
        requestAnimationFrame(draw);
    }

    // Input Handling
    function jump() {
        if (player.grounded) {
            player.dy = -player.jumpForce;
            player.grounded = false;
        }
    }

    window.addEventListener("keydown", (e) => { if(e.code === "Space") jump(); });
    canvas.addEventListener("mousedown", jump);

    draw();
</script>
</body>
</html>
